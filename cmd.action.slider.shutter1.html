<div class="cmd cmd-widget" data-type="action" data-subtype="slider" data-template="button" data-cmd_id="#id#" data-cmd_uid="#uid#" data-version="#version#" data-eqLogic_id="#eqLogic_id#">
  <!-- ################ Slider shutter ################ 
  Widget name : cmd.action.slider.shutter1
  Author : Phpvarious
  Version : 2026/03/06 18h30
  Doc : https://phpvarious.github.io/documentation/widget/fr_FR/action/slider/cmd.action.slider.shutter1/
-->
  
  <div class="title #hide_name#">
    <div class="cmdName">#name_display#</div>
  </div>
  <div class="content container-#uid#" id="container-#uid#" data-template="shutter">
    <div id="slider-#uid#"></div>
    <div class="sliderValue-#uid#"></div>
  </div>

  <template>
    <div>step : Pas utilisé pour le changement de valeur. [ défaut : 1 ]</div>
    <div>widthShutter : Largeur du slider. [ défaut : 60 ]</div>
    <div>heightShutter : Hauteur du slider. [ défaut : 80 ]</div>
    <div>image : Type d'ouvrant : [ défaut : bay_white | bay_white2 | bay_black | bay_black2 | bay_wood | bay_wood2 | window | window2 | window3 | window4 | velux | garage | garage1 | garage2 | garage3]</div>
    <div>blades :Type de lamelle : [ défaut : light | dark | wood ]</div>
    <div>handle : Type de poignée : [ défaut : light | dark | wood ]</div>
    <div>offset : Offset pour considérer le volet comme ajouré. [ défaut : 0 ]</div>
    <div>direction : Par défaut, Fermé = 100% . Pour inverser mettre ce paramètre a 1.</div>
<div>hideValue : Masque la valeur sous le widget. [ défaut : 0 (affiché) ]</div>
    <div> </div>
    <div>-------------- Ajout d'une image personnalisée -----------</div>
    <div>- L'images doit être de type png.</div>
    <div>- Elle doit être importée dans le dossier du widget (cmd.action.slider.shutter1).</div>
    <div>/!\ Utilisez les paramètres ci-dessous, seulement si vous constatez un décalage des volets sur le widget.</div>
    <div>paramTop : Permet un décalage du volet en partie haute.</div>
    <div>paramBottom : Permet un décalage du volet en partie basse.</div>
    <div>paramOffset : Permet de retailler et recentrer le volet.</div>
    <div>paramRadius : Taille d'arrondi bas du selecteur.</div>
  </template>

  <script>
    
    /* ------------ General -------------- */
    var maxValue_#uid# = parseFloat('#maxValue#')
    var minValue_#uid# = parseFloat('#minValue#')
    var slider_#uid# = document.getElementById('slider-#uid#')
    var direction_#uid# = ('#direction#' == '1') ? true : false
    var colorBlades_#uid# = ('#blades#' !='#'+'blades#') ? '#blades#' : 'light'
    var colorHandle_#uid# = ('#handle#' !='#'+'handle#') ? '#handle#' : 'light'
    var offset_#uid# = ('#offset#' !='#'+'offset#' && '#offset#' != '' && '#offset#' > 1) ? parseFloat('#offset#') : false
    var image_#uid# = ('#image#' !='#'+'image#') ? '#image#' : 'bay_white';
    
    /* ----------- createOptions ----------- */
    var createOptions_#uid# = {
      start: [('#state#' == '') ? minValue_#uid# : parseFloat('#state#')],
      behaviour: 'snap',
      connect: "lower",
      step: (domUtils.issetWidgetOptParam('#step#', 'step')) ? parseFloat('#step#') : 1,
      range: {
        'min': [minValue_#uid#],
        'max': [maxValue_#uid#]
      },
      direction: 'ltr',
      orientation: 'vertical',
      tooltips: false,
      unite: '#unite#',
      format: {
        from: Number,
        to: function(value) {
          let dec = createOptions_#uid#.step.toString().includes('.') ? (createOptions_#uid#.step.toString().length - 1) - createOptions_#uid#.step.toString().indexOf('.') : 0
          return ((Math.round(value * (100 / createOptions_#uid#.step)) / (100 / createOptions_#uid#.step)).toFixed(dec) + '' + createOptions_#uid#.unite).trim()
        }
      }
    }
    
    /* ------------ General -------------- */
    if (is_numeric('#widthShutter#')) document.documentElement.style.setProperty('--shutter-width-#uid#', parseFloat('#widthShutter#') + 'px')
    if (is_numeric('#heightShutter#')) document.documentElement.style.setProperty('--shutter-height-#uid#', parseFloat('#heightShutter#') + 'px')
    document.documentElement.style.setProperty('--shutter-handle-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/selecteur_' + colorHandle_#uid# + '.png)')
    document.documentElement.style.setProperty('--shutter-image-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/' + image_#uid# + '.png)')
    
    if (image_#uid# == "velux") {
      document.documentElement.style.setProperty('--padding-top-#uid#', '15px') //parseFloat('#widthShutter#')
      document.documentElement.style.setProperty('--padding-bottom-#uid#', '12px')
      document.documentElement.style.setProperty('--handle-radius-#uid#', '1px')
    } else if (image_#uid# == "window"|| image_#uid# == "window2" || image_#uid# == "window3") {
      document.documentElement.style.setProperty('--padding-top-#uid#', '3px')
      document.documentElement.style.setProperty('--padding-bottom-#uid#', '11px')
      document.documentElement.style.setProperty('--handle-radius-#uid#', '3px')
    } else if (image_#uid# == "window4") {
      document.documentElement.style.setProperty('--padding-top-#uid#', '6px')
      document.documentElement.style.setProperty('--padding-bottom-#uid#', '12px')
      document.documentElement.style.setProperty('--handle-radius-#uid#', '3px')
    } else if (image_#uid# == "garage") {
      //document.documentElement.style.setProperty('--shutter-lames-height-#uid#', '14px')
    } else if (image_#uid# == "bay_white2") {
      document.documentElement.style.setProperty('--padding-horizontal-#uid#', '4px')
      document.documentElement.style.setProperty('--padding-top-#uid#', '8px')
    } else if (image_#uid# == "bay_black" || image_#uid# == "bay_black2" || image_#uid# == "bay_white" || image_#uid# == "bay_wood" || image_#uid# == "bay_wood2") {
      document.documentElement.style.setProperty('--padding-bottom-#uid#', '12px')
    }
    /* param specific */
    if (is_numeric('#paramTop#')) document.documentElement.style.setProperty('--padding-top-#uid#', parseFloat('#paramTop#') + 'px')
    if (is_numeric('#paramBottom#')) document.documentElement.style.setProperty('--padding-bottom-#uid#', parseFloat('#paramBottom#') + 'px')
    if (is_numeric('#paramOffset#')) document.documentElement.style.setProperty('--padding-horizontal-#uid#', parseFloat('#paramOffset#') + 'px')
    if (is_numeric('#paramRadius#')) document.documentElement.style.setProperty('--handle-radius-#uid#', parseFloat('#paramRadius#') + 'px')
    
    /* ----------- direction ----------- */
    if (direction_#uid# == true) createOptions_#uid#.direction = 'rtl'
    
    /* ----------- init noUiSlider ----------- */
    noUiSlider.create(slider_#uid#, createOptions_#uid#);
    
    /* events noUiSlider */
    slider_#uid#.noUiSlider.on('end', function(values, handle) {
      jeedom.cmd.execute({ id: '#id#', value: { slider: values[handle].replace('#unite#', '').trim() } })
    })
    
    slider_#uid#.noUiSlider.on('update', function(values, handle) {
      let value = values[0].replace('#unite#','').replace(' ','')
      let container = document.getElementById('container-#uid#')
      let position = value;
      document.documentElement.style.setProperty('--shutter-backgroundHeight-#uid#', ((direction_#uid# == true) ? parseInt(maxValue_#uid#) - value + '%' : value + '%'))
      if (direction_#uid# == true) {
        if (offset_#uid# != false) {
          if (value < 1) {
            container.querySelector('.sliderValue-#uid#').innerHTML = 'Fermé'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lamepleine_' + colorBlades_#uid# + '.png)')
          } else {
            if (value >= 1  && value <= offset_#uid#) {
              container.querySelector('.sliderValue-#uid#').innerHTML = 'Ajouré'
            } else if (value >= maxValue_#uid#) {
              container.querySelector('.sliderValue-#uid#').innerHTML = 'Ouvert'
            } else {
              container.querySelector('.sliderValue-#uid#').innerHTML = value + ' #unite#'
            }
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lame_' + colorBlades_#uid# + '.png)')
          }
        } else {
          if (value < 1) {
            container.querySelector('.sliderValue-#uid#').innerHTML = 'Fermé'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lamepleine_' + colorBlades_#uid# + '.png)')
          } else {
            if (value >= maxValue_#uid#) container.querySelector('.sliderValue-#uid#').innerHTML = 'Ouvert'
            else container.querySelector('.sliderValue-#uid#').innerHTML = value + ' #unite#'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lame_' + colorBlades_#uid# + '.png)')
          }
        }
      } else {
        if (offset_#uid# != false) {
          if (value >= maxValue_#uid#) {
            container.querySelector('.sliderValue-#uid#').innerHTML = 'Fermé'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lamepleine_' + colorBlades_#uid# + '.png)')
          } else {
            if (value < maxValue_#uid#  && value >= (maxValue_#uid# - offset_#uid#)) container.querySelector('.sliderValue-#uid#').innerHTML = 'Ajouré'
            else if (value < 1) container.querySelector('.sliderValue-#uid#').innerHTML = 'Ouvert'
            else container.querySelector('.sliderValue-#uid#').innerHTML = value + ' #unite#'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lame_' + colorBlades_#uid# + '.png)')
          }
        } else {
          if (value >= maxValue_#uid#) {
            container.querySelector('.sliderValue-#uid#').innerHTML = 'Fermé'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lamepleine_' + colorBlades_#uid# + '.png)')
          } else {
            if (value < 1) container.querySelector('.sliderValue-#uid#').innerHTML = 'Ouvert'
            else container.querySelector('.sliderValue-#uid#').innerHTML = value + ' #unite#'
            document.documentElement.style.setProperty('--shutter-lames-#uid#', 'url(data/customTemplates/dashboard/cmd.action.slider.shutter1/lame_' + colorBlades_#uid# + '.png)')
          }
        }
      }
    })
    
    jeedom.cmd.addUpdateFunction('#id#', function(_options) {
      if (is_object(cmd = document.querySelector('.cmd[data-cmd_uid="#uid#"]'))) {
        if (_options.value != undefined && slider_#uid#.noUiSlider) {
          if (slider_#uid#.noUiSlider) slider_#uid#.noUiSlider.set(_options.value)
        }
      }
    })
    
    jeedom.cmd.refreshValue([{cmd_id:'#id#', value: '#state#', valueDate: '#valueDate#', collectDate: '#collectDate#', alertLevel: '#alertLevel#', unit: '#unite#'}])
  </script>
  
  <style>
    :root {
      --shutter-height-#uid#: 80px;
      --shutter-width-#uid#: 60px;
      --shutter-lames-height-#uid#: 9px;
      --shutter-image-#uid#: url(data/customTemplates/dashboard/cmd.action.slider.slider1/bay_white.png);
      --shutter-handle-#uid#: url(data/customTemplates/dashboard/cmd.action.slider.slider1/selecteur_light.png);
      --shutter-lames-#uid#: url(data/customTemplates/dashboard/cmd.action.slider.slider1/lame_light.png);
      --shutter-backgroundHeight-#uid# : 100%;
      --padding-top-#uid# : 10px;
      --padding-bottom-#uid# : 9px;
      --padding-horizontal-#uid# : 8px;
      --handle-radius-#uid# : 4px;
    }
    
    /* ------------ Styles --------------- */
    .cmd.cmd-widget[data-cmd_uid=#uid#] {
      user-select: none;
    }
    #slider-#uid#.noUi-vertical {
      height: var(--shutter-height-#uid#);
      width: var(--shutter-width-#uid#) !important;
      background: var(--shutter-image-#uid#) no-repeat !important;
      background-position: bottom center !important;
      background-size: var(--shutter-width-#uid#) var(--shutter-height-#uid#) !important;
    }
    #slider-#uid# .noUi-connects {
      background: transparent;
      border-radius: 3px 3px 0px 0px;
    }
    #slider-#uid# .noUi-handle {
      width: calc(var(--shutter-width-#uid#) - var(--padding-horizontal-#uid#));
      height: 9px;
      background: var(--shutter-handle-#uid#) center !important;
      border-radius: 0 0 var(--handle-radius-#uid#) var(--handle-radius-#uid#) !important;
      left: unset !important;
      bottom: -9px;
      right: calc(var(--padding-horizontal-#uid#) / 2);
    }
    #slider-#uid#.noUi-target {
      border: 0;
    }
    #slider-#uid# .noUi-connect {
      width: calc(var(--shutter-width-#uid#) - var(--padding-horizontal-#uid#));
      left: calc(var(--padding-horizontal-#uid#) / 2);
      /* top: 11px; */
      height: var(--shutter-backgroundHeight-#uid#);
      transform: unset !important;
      background-color: unset !important;
      background-image: unset !important;
      background: var(--shutter-lames-#uid#) center !important;
       background-size: var(--shutter-width-#uid#) var(--shutter-lames-height-#uid#) !important;
      /* left: unset; */
    }
    #slider-#uid# .noUi-handle::before,
    #slider-#uid# .noUi-handle::after {
      display: none;
    }
    #slider-#uid# {
      padding: var(--padding-top-#uid#) 0px var(--padding-bottom-#uid#) 0px;
    }
    #slider-#uid#.noUi-target,
    #slider-#uid# .noUi-handle {
      border: 0;
      box-shadow: none;
    }
    #slider-#uid# .noUi-connects,
    #slider-#uid# .noUi-handle {
      cursor: pointer;
    }
    .container-#uid# .vertical {
      padding: 15px 30px 0px 30px;
    }
    .sliderValue-#uid# {
      font-weight: bold;
      position: relative;
      margin: 5px;
      min-width: 40px;
    }
  </style>
</div>
